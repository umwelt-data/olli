<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olli Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 960px; margin: 0 auto; }
    h1 { margin-bottom: 1rem; }
    nav { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; }
    nav button {
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    nav button[aria-pressed="true"] {
      background: #333;
      color: #fff;
      border-color: #333;
    }
    #example-container {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1rem;
      min-height: 200px;
    }
  </style>
</head>
<body>
  <h1>Olli Playground</h1>
  <nav id="nav"></nav>
  <div id="example-container"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
